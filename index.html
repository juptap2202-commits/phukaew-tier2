<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>PHUKAEW Tier List - Viral Edition</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { letter-spacing: 2px; font-weight: 300; text-transform: uppercase; margin-bottom: 30px; color: #fff; }
        #tier-list-container { width: 100%; max-width: 950px; border: 1px solid #333; background: #1a1a1a; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tier-row { display: flex; min-height: 120px; border-bottom: 1px solid #333; }
        .tier-row:last-child { border-bottom: none; }
        .tier-label { width: 180px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; text-align: center; padding: 15px; font-size: 1.2em; text-transform: uppercase; }
        .tier-content { flex-grow: 1; background: #1e1e1e; padding: 10px; display: flex; flex-wrap: wrap; gap: 10px; min-height: 100px; }
        .tier-item { width: 100px; height: 100px; border: 1px solid #444; cursor: grab; overflow: hidden; background: #000; transition: transform 0.1s; }
        .tier-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .drag-over { background: #333 !important; border: 2px dashed #fff !important; }
        #image-pool-container { width: 100%; max-width: 950px; background: #1a1a1a; padding: 25px; border: 1px solid #333; border-radius: 4px; }
        .pool-header { margin-bottom: 15px; color: #888; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
        #image-pool { min-height: 150px; border: 1px dashed #444; }
    </style>
</head>
<body>

    <h1>PHUKAEW TIER LIST</h1>

    <div id="tier-list-container">
        <div class="tier-row"><div class="tier-label" style="background: #FF4B2B;">ชีเสิร์ฟ</div><div class="tier-content"></div></div>
        <div class="tier-row"><div class="tier-label" style="background: #FF8C00;">ต๊าซ</div><div class="tier-content"></div></div>
        <div class="tier-row"><div class="tier-label" style="background: #FFD700;">ยืนหนึ่ง</div><div class="tier-content"></div></div>
        <div class="tier-row"><div class="tier-label" style="background: #90EE90;">จึ้ง</div><div class="tier-content"></div></div>
    </div>

    <div id="image-pool-container">
        <div class="pool-header">เลือกสินค้าลากไปวางจัดอันดับได้เลย! (รีเฟรชเพื่อเริ่มใหม่)</div>
        <div id="image-pool" class="tier-content"></div>
    </div>

    <script>
        // รายชื่อไฟล์รูปภาพที่คุณตั้งชื่อไว้ (phu1.png - phu15.png)
        const imageUrls = [
            'phu1.png', 'phu2.png', 'phu3.png', 'phu4.png', 'phu5.png',
            'phu6.png', 'phu7.png', 'phu8.png', 'phu9.png', 'phu10.png',
            'phu11.png', 'phu12.png', 'phu13.png', 'phu14.png', 'phu15.png'
        ];

        let draggedItem = null;

        window.onload = () => {
            const pool = document.getElementById('image-pool');
            imageUrls.forEach(url => {
                const div = document.createElement('div');
                div.className = 'tier-item';
                div.draggable = true;
                div.innerHTML = `<img src="${url}" onerror="this.parentElement.style.display='none'">`;
                
                div.addEventListener('dragstart', () => { 
                    draggedItem = div;
                    setTimeout(() => div.style.opacity = '0.5', 0);
                });
                
                div.addEventListener('dragend', () => { 
                    div.style.opacity = '1';
                    draggedItem = null; 
                });

                pool.appendChild(div);
            });
        };

        document.querySelectorAll('.tier-content').forEach(zone => {
            zone.addEventListener('dragover', e => {
                e.preventDefault();
                zone.classList.add('drag-over');
            });
            zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                if (draggedItem) zone.appendChild(draggedItem);
            });
        });
    </script>
</body>
</html>
